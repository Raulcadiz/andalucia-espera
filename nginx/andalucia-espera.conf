server {
    server_name andalucia-espera.ddns.net _;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8112;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location / {
        root /var/www/andalucia-espera;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/andalucia-espera.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andalucia-espera.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = andalucia-espera.ddns.net) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name andalucia-espera.ddns.net _;
    return 404;
}
