# HTTP → HTTPS redirect
server {
    listen 80;
    listen 112;
    server_name andalucia-espera.ddns.net _;
    return 301 https://andalucia-espera.ddns.net$request_uri;
}

# HTTPS — producción
server {
    listen 443 ssl;
    server_name andalucia-espera.ddns.net;

    ssl_certificate     /etc/letsencrypt/live/andalucia-espera.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andalucia-espera.ddns.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Cabeceras de seguridad ─────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options     "nosniff"                          always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;
    add_header X-XSS-Protection           "1; mode=block"                    always;
    add_header Permissions-Policy         "geolocation=(), microphone=()"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self';"
        always;

    # ── API → FastAPI ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8112;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── SPA estática ──────────────────────────────────────────────────────────
    location / {
        root       /var/www/andalucia-espera;
        try_files  $uri $uri/ /index.html;

        # Cache largo para assets versionados por Vite
        location ~* \.(?:js|css|woff2?|svg|png|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
